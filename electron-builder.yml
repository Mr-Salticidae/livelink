appId: io.jspider.livelink
productName: LiveLink
directories:
  output: out/dist
  buildResources: resources
files:
  - "out/main/**"
  - "out/preload/**"
  - "out/renderer/**"
  - "package.json"
  - "!**/.DS_Store"
asarUnpack:
  - "resources/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
  # icon: resources/icon.ico   # 跳蛛先生补好 icon 后取消这行注释
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LiveLink
  # 开始菜单生成 LiveLink 分组文件夹，内含启动 + 卸载两个快捷方式（朋友在开始菜单能找到卸载入口）
  menuCategory: true
  # NSIS 安装/卸载向导只装简体中文（默认行为是装全部语言+按系统语言挑，对英文 Win 用户会显示英文向导。
  # 这里限定 zh_CN，让 addLangs 只 insert SimpChinese——朋友不论什么系统语言都看中文向导）
  installerLanguages:
    - zh_CN
  # installerIcon: resources/icon.ico
  # uninstallerIcon: resources/icon.ico
