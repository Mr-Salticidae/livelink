appId: io.jspider.livelink
productName: LiveLink
directories:
  output: out/dist
  buildResources: resources
files:
  - "out/main/**"
  - "out/preload/**"
  - "out/renderer/**"
  - "package.json"
  - "!**/.DS_Store"
asarUnpack:
  - "resources/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
  # icon: resources/icon.ico   # 跳蛛先生补好 icon 后取消这行注释
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LiveLink
  # installerIcon: resources/icon.ico
  # uninstallerIcon: resources/icon.ico
